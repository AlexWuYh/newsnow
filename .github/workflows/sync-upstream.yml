name: Sync Upstream

on:
  schedule:
    # 每天UTC 0点运行（可根据需要调整）
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ourongxing/newsnow.git 2>/dev/null || true
          git remote set-url upstream https://github.com/ourongxing/newsnow.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for differences
        id: check
        run: |
          DIFF=$(git diff HEAD upstream/main --stat | wc -l)
          if [ "$DIFF" -gt 0 ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_diff == 'true'
        run: |
          git merge -m "chore: sync upstream updates" upstream/main --allow-unrelated-histories || true

      - name: Push to origin
        if: steps.check.outputs.has_diff == 'true'
        run: |
          git push origin main
